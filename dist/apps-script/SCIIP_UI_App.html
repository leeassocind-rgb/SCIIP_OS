<script>
(function(){'use strict';
const state=window.SCIIP_BOOTSTRAP||{};
const $=id=>document.getElementById(id), app=$('app'), nav=$('workspaceNav'), sidebar=$('sidebar');
function esc(v){return String(v==null?'':v).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));}
function workspace(id){return (state.workspaces||[]).find(x=>x.id===id)||(state.workspaces||[])[0];}
function renderNav(){nav.innerHTML=(state.workspaces||[]).map(w=>`<button class="nav-button" data-view="${esc(w.id)}" aria-current="${w.id===state.activeWorkspace?'page':'false'}"><span class="nav-label">${esc(w.label)}</span><span class="nav-meta">${esc(w.capability)}</span></button>`).join('');}
function renderSummary(){const h=state.health||{},r=state.release||{};const rows=[['Platform',h.overall||'UNKNOWN','Live system status'],['API',h.api&&h.api.status||'UNKNOWN',h.api&&h.api.version||''],['Storage',h.storage&&h.storage.status||'UNKNOWN',h.storage&&h.storage.backend||''],['Release',r.status||'UNKNOWN',(r.certifiedDomains||0)+' certified domains']];$('summary').innerHTML=rows.map(x=>`<article class="summary-card"><h2>${esc(x[0])}</h2><div class="summary-value">${esc(x[1])}</div><div class="summary-detail">${esc(x[2])}</div></article>`).join('');$('systemStatus').textContent=h.overall||'UNKNOWN';}
function renderActivity(){const items=state.notifications||[];$('activityPanel').innerHTML='<h2>Platform Activity</h2>'+items.map(n=>`<article class="activity-item"><span class="pill">${esc(n.severity)}</span><div class="activity-title">${esc(n.title)}</div><div class="activity-detail">${esc(n.detail)}</div></article>`).join('');$('notificationDrawer').innerHTML='<h2>Notifications</h2>'+items.map(n=>`<article class="activity-item"><div class="activity-title">${esc(n.title)}</div><div class="activity-detail">${esc(n.detail)}</div></article>`).join('');}

function renderExecutiveDashboard(){
  const d=state.executiveDashboard||{};
  const kpis=(d.kpis||[]).map(k=>`<article class="dashboard-kpi tone-${esc(k.tone||'neutral')}"><div class="dashboard-kpi-label">${esc(k.label)}</div><div class="dashboard-kpi-value">${esc(k.value)}</div><div class="dashboard-kpi-detail">${esc(k.detail)}</div></article>`).join('');
  const systems=(d.systems||[]).map(s=>`<tr><td>${esc(s.name)}</td><td><span class="status-dot status-${String(s.status||'').toLowerCase()}"></span>${esc(s.status)}</td><td>${esc(s.detail)}</td></tr>`).join('');
  const domains=((d.certification||{}).domains||[]).map(x=>`<div class="domain-chip"><span>${esc(x.name)}</span><strong>${esc(x.status)}</strong></div>`).join('');
  const alerts=(d.alerts||[]).map(a=>`<article class="dashboard-alert alert-${esc(a.severity)}"><strong>${esc(a.title)}</strong><span>${esc(a.detail)}</span></article>`).join('');
  const activity=(d.activity||[]).map(a=>`<article class="timeline-item"><time>${esc(a.time)}</time><div><strong>${esc(a.title)}</strong><p>${esc(a.detail)}</p></div></article>`).join('');
  $('workspaceContent').innerHTML=`<div class="workspace-toolbar"><strong>Executive Dashboard</strong><span class="pill">LIVE ALPHA</span></div><section class="dashboard-kpi-grid">${kpis}</section><section class="dashboard-two-column"><article class="dashboard-section"><h2>Platform Systems</h2><div class="table-wrap"><table><thead><tr><th>System</th><th>Status</th><th>Detail</th></tr></thead><tbody>${systems}</tbody></table></div></article><article class="dashboard-section"><h2>Operational Alerts</h2>${alerts}</article></section><section class="dashboard-section"><div class="section-heading"><h2>Production Certification</h2><span>${esc((d.certification||{}).certified||0)} / ${esc((d.certification||{}).total||0)}</span></div><div class="domain-grid">${domains}</div></section><section class="dashboard-section"><h2>Recent Activity</h2><div class="timeline">${activity}</div></section>`;
}


function propertyCard(p){return `<button class="property-row" data-property-id="${esc(p.propertyId)}"><span><strong>${esc(p.address)}</strong><small>${esc(p.city)}, ${esc(p.state)}</small></span><span>${Number(p.buildingSf||0).toLocaleString()} SF</span><span>${Number(p.landAcres||0).toLocaleString()} AC</span><span class="pill">${esc(p.status)}</span></button>`;}
function renderPropertyDetail(p){const target=$('propertyDetail');if(!target)return;if(!p){target.innerHTML='<div class="property-empty"><h3>Select a property</h3><p>Choose a result to review its physical, operational, and GIS attributes.</p></div>';return;}const map=(p.latitude&&p.longitude)?`<a class="primary-button map-link" target="_blank" rel="noopener" href="https://www.google.com/maps?q=${encodeURIComponent(p.latitude+','+p.longitude)}">Open map</a>`:'<span class="pill">Coordinates unavailable</span>';target.innerHTML=`<div class="property-detail-head"><div><p class="eyebrow">${esc(p.propertyId)}</p><h2>${esc(p.address)}</h2><p>${esc(p.city)}, ${esc(p.state)} · ${esc(p.propertyType)}</p></div>${map}</div><div class="property-metrics"><div><span>Building</span><strong>${Number(p.buildingSf||0).toLocaleString()} SF</strong></div><div><span>Land</span><strong>${Number(p.landAcres||0).toLocaleString()} AC</strong></div><div><span>Clear</span><strong>${Number(p.clearHeight||0).toLocaleString()} FT</strong></div><div><span>Dock High</span><strong>${Number(p.dockHigh||0).toLocaleString()}</strong></div><div><span>Power</span><strong>${Number(p.powerAmps||0).toLocaleString()} A</strong></div><div><span>Status</span><strong>${esc(p.status)}</strong></div></div><p class="property-source">Source: ${esc(p.source)}</p>`;}
function bindPropertyExplorer(data){const results=data.results||[];const list=$('propertyResults');if(!list)return;list.innerHTML=results.length?results.map(propertyCard).join(''):'<div class="property-empty"><h3>No matching properties</h3><p>Adjust the search or filters.</p></div>';$('propertyCount').textContent=results.length+' of '+(data.totalCatalog||0)+' properties';$('propertySource').textContent=data.source||'UNKNOWN';list.addEventListener('click',e=>{const row=e.target.closest('[data-property-id]');if(!row)return;renderPropertyDetail(results.find(p=>p.propertyId===row.dataset.propertyId));});renderPropertyDetail(results[0]||null);}
function propertyFilters(){return {query:$('propertyQuery').value,city:$('propertyCity').value,status:$('propertyStatus').value,minSf:$('propertyMinSf').value,minAcres:$('propertyMinAcres').value};}
function runPropertySearch(){const button=$('propertySearchButton');button.disabled=true;button.textContent='Searching…';const done=data=>{state.propertyExplorer=data;bindPropertyExplorer(data);button.disabled=false;button.textContent='Search';};const fail=error=>{button.disabled=false;button.textContent='Search';$('propertyResults').innerHTML='<div class="state-panel error">Search failed: '+esc(error&&error.message||error)+'</div>';};if(window.google&&google.script&&google.script.run){google.script.run.withSuccessHandler(done).withFailureHandler(fail).sciipPropertyExplorerSearch(propertyFilters());}else{done(state.propertyExplorer||{results:[],totalCatalog:0});}}
function renderPropertyExplorer(){const d=state.propertyExplorer||{results:[],facets:{cities:[],statuses:[]}};const cities=(d.facets&&d.facets.cities||[]).map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');const statuses=(d.facets&&d.facets.statuses||[]).map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');$('workspaceContent').innerHTML=`<div class="workspace-toolbar"><strong>Property Explorer</strong><span class="pill">LIVE ALPHA</span></div><section class="property-filter-bar"><label>Search<input id="propertyQuery" type="search" placeholder="Address, city, ID, status"></label><label>City<select id="propertyCity"><option value="">All cities</option>${cities}</select></label><label>Status<select id="propertyStatus"><option value="">All statuses</option>${statuses}</select></label><label>Min building SF<input id="propertyMinSf" type="number" min="0" step="1000"></label><label>Min acres<input id="propertyMinAcres" type="number" min="0" step="0.1"></label><button id="propertySearchButton" class="primary-button">Search</button></section><div class="property-meta"><span id="propertyCount"></span><span>Source: <strong id="propertySource"></strong></span></div><section class="property-layout"><div id="propertyResults" class="property-results" aria-label="Property results"></div><article id="propertyDetail" class="property-detail" aria-live="polite"></article></section>`;$('propertySearchButton').addEventListener('click',runPropertySearch);$('propertyQuery').addEventListener('keydown',e=>{if(e.key==='Enter')runPropertySearch();});bindPropertyExplorer(d);}


function graphNodeCard(n){return `<button class="graph-node" data-graph-node="${esc(n.id)}" aria-pressed="false"><span class="graph-node-type">${esc(n.type)}</span><strong>${esc(n.label)}</strong><small>${esc(n.city||n.status||'')}</small><span class="pill">${Number(n.degree||0)} links</span></button>`;}
function renderGraphDetail(node,data){const target=$('graphDetail');if(!target)return;if(!node){target.innerHTML='<div class="graph-empty"><div><h3>Select a node</h3><p>Choose an entity to inspect its relationships.</p></div></div>';return;}const connected=(data.edges||[]).filter(e=>e.source===node.id||e.target===node.id);const edgeHtml=connected.length?connected.map(e=>`<div class="edge-item"><strong>${esc(e.type)}</strong><br>${esc(e.source)} → ${esc(e.target)}</div>`).join(''):'<div class="graph-empty">No visible relationships.</div>';target.innerHTML=`<p class="eyebrow">${esc(node.type)}</p><h2>${esc(node.label)}</h2><p>${esc(node.description||'No description available.')}</p><div class="graph-stat-grid"><div class="graph-stat"><span>Node ID</span><strong>${esc(node.id)}</strong></div><div class="graph-stat"><span>Status</span><strong>${esc(node.status||'Unknown')}</strong></div><div class="graph-stat"><span>City</span><strong>${esc(node.city||'—')}</strong></div><div class="graph-stat"><span>Visible degree</span><strong>${Number(node.degree||connected.length)}</strong></div></div><h3>Relationships</h3><div class="edge-list">${edgeHtml}</div>`;}
function bindKnowledgeGraph(data){const nodes=data.nodes||[];const canvas=$('graphCanvas');if(!canvas)return;canvas.innerHTML=nodes.length?`<div class="graph-node-grid">${nodes.map(graphNodeCard).join('')}</div>`:'<div class="graph-empty"><div><h3>No matching nodes</h3><p>Adjust the search or node type.</p></div></div>';$('graphCounts').textContent=(data.nodeCount||0)+' nodes · '+(data.edgeCount||0)+' edges';$('graphSource').textContent=data.source||'UNKNOWN';canvas.addEventListener('click',e=>{const b=e.target.closest('[data-graph-node]');if(!b)return;canvas.querySelectorAll('[data-graph-node]').forEach(x=>x.setAttribute('aria-pressed',String(x===b)));renderGraphDetail(nodes.find(n=>n.id===b.dataset.graphNode),data);});renderGraphDetail(nodes[0]||null,data);}
function graphFilters(){return {query:$('graphQuery').value,type:$('graphType').value};}
function runGraphSearch(){const button=$('graphSearchButton');button.disabled=true;button.textContent='Loading…';const done=data=>{state.knowledgeGraph=data;bindKnowledgeGraph(data);button.disabled=false;button.textContent='Explore';};const fail=error=>{button.disabled=false;button.textContent='Explore';$('graphCanvas').innerHTML='<div class="state-panel error">Graph query failed: '+esc(error&&error.message||error)+'</div>';};if(window.google&&google.script&&google.script.run){google.script.run.withSuccessHandler(done).withFailureHandler(fail).sciipKnowledgeGraphSnapshot(graphFilters());}else{done(state.knowledgeGraph||{nodes:[],edges:[]});}}
function renderKnowledgeGraph(){const d=state.knowledgeGraph||{nodes:[],edges:[],facets:{types:[]}};const types=(d.facets&&d.facets.types||[]).map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');$('workspaceContent').innerHTML=`<div class="workspace-toolbar"><strong>Knowledge Graph Viewer</strong><span class="pill">LIVE ALPHA</span></div><section class="graph-toolbar"><label>Search<input id="graphQuery" type="search" placeholder="Entity, relationship, city, status"></label><label>Node type<select id="graphType"><option value="">All node types</option>${types}</select></label><button id="graphSearchButton" class="primary-button">Explore</button></section><div class="graph-meta"><span id="graphCounts"></span><span>Source: <strong id="graphSource"></strong></span></div><section class="graph-layout"><div id="graphCanvas" class="graph-canvas" aria-label="Knowledge graph nodes"></div><aside id="graphDetail" class="graph-detail" aria-live="polite"></aside></section>`;$('graphSearchButton').addEventListener('click',runGraphSearch);$('graphQuery').addEventListener('keydown',e=>{if(e.key==='Enter')runGraphSearch();});bindKnowledgeGraph(d);}



function gisMarker(feature,bounds,index){const pad=7;const lngRange=Math.max(.0001,bounds.maxLongitude-bounds.minLongitude),latRange=Math.max(.0001,bounds.maxLatitude-bounds.minLatitude);const x=pad+((feature.longitude-bounds.minLongitude)/lngRange)*(100-pad*2);const y=100-pad-((feature.latitude-bounds.minLatitude)/latRange)*(100-pad*2);const label=String(feature.label||'').length>28?String(feature.label).slice(0,26)+'…':feature.label;return `<g class="gis-marker" tabindex="0" role="button" aria-label="${esc(feature.label)}" data-gis-feature="${esc(feature.id)}" data-layer="${esc(feature.layer)}" transform="translate(${x} ${y})"><circle r="1.8"></circle><text class="gis-map-label" x="2.8" y=".8">${esc(label)}</text></g>`;}
function renderGisDetail(feature,data){const target=$('gisDetail');if(!target)return;if(!feature){target.innerHTML='<div class="gis-empty"><div><h3>Select a map feature</h3><p>Choose a marker to inspect its spatial details.</p></div></div>';return;}const mapLink=`https://www.google.com/maps?q=${encodeURIComponent(feature.latitude+','+feature.longitude)}`;const layerCounts={};(data.features||[]).forEach(f=>layerCounts[f.layer]=(layerCounts[f.layer]||0)+1);target.innerHTML=`<p class="eyebrow">${esc(feature.layer)} · ${esc(feature.type)}</p><h2>${esc(feature.label)}</h2><p>${esc(feature.detail||'No additional detail available.')}</p><div class="gis-stat-grid"><div class="gis-stat"><span>Feature ID</span><strong>${esc(feature.id)}</strong></div><div class="gis-stat"><span>Status</span><strong>${esc(feature.status||'Unknown')}</strong></div><div class="gis-stat"><span>City</span><strong>${esc(feature.city||'—')}</strong></div><div class="gis-stat"><span>Coordinates</span><strong>${Number(feature.latitude).toFixed(5)}, ${Number(feature.longitude).toFixed(5)}</strong></div></div><a class="primary-button" href="${mapLink}" target="_blank" rel="noopener">Open in satellite map</a><h3>Visible layers</h3><div class="gis-layer-list">${Object.keys(layerCounts).sort().map(layer=>`<div class="gis-layer-item"><span><i class="gis-dot ${esc(layer).replace(/\s+/g,'-')}"></i>${esc(layer)}</span><strong>${layerCounts[layer]}</strong></div>`).join('')}</div>`;}
function bindGisWorkspace(data){const features=data.features||[],map=$('gisMap');if(!map)return;$('gisCounts').textContent=(data.featureCount||0)+' map-ready features';$('gisSource').textContent=data.source||'UNKNOWN';if(!features.length||!data.bounds){map.innerHTML='<div class="gis-empty"><div><h3>No map features</h3><p>Adjust the filters or connect a registry containing coordinates.</p></div></div>';renderGisDetail(null,data);return;}map.innerHTML=`<div class="gis-map-grid"></div><svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-label="SCIIP spatial feature map">${features.map((f,i)=>gisMarker(f,data.bounds,i)).join('')}</svg>`;map.addEventListener('click',e=>{const marker=e.target.closest('[data-gis-feature]');if(!marker)return;renderGisDetail(features.find(f=>f.id===marker.dataset.gisFeature),data);});map.addEventListener('keydown',e=>{if((e.key==='Enter'||e.key===' ')&&e.target.closest('[data-gis-feature]')){e.preventDefault();const marker=e.target.closest('[data-gis-feature]');renderGisDetail(features.find(f=>f.id===marker.dataset.gisFeature),data);}});renderGisDetail(features[0],data);}
function gisFilters(){return {query:$('gisQuery').value,layer:$('gisLayer').value,status:$('gisStatus').value};}
function runGisSearch(){const button=$('gisSearchButton');button.disabled=true;button.textContent='Mapping…';const done=data=>{state.gisWorkspace=data;bindGisWorkspace(data);button.disabled=false;button.textContent='Map';};const fail=error=>{button.disabled=false;button.textContent='Map';$('gisMap').innerHTML='<div class="state-panel error">GIS query failed: '+esc(error&&error.message||error)+'</div>';};if(window.google&&google.script&&google.script.run){google.script.run.withSuccessHandler(done).withFailureHandler(fail).sciipGisWorkspaceSnapshot(gisFilters());}else{done(state.gisWorkspace||{features:[]});}}
function renderGisWorkspace(){const d=state.gisWorkspace||{features:[],facets:{layers:[],statuses:[]}};const layers=(d.facets&&d.facets.layers||[]).map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');const statuses=(d.facets&&d.facets.statuses||[]).map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');$('workspaceContent').innerHTML=`<div class="workspace-toolbar"><strong>GIS Workspace</strong><span class="pill">LIVE ALPHA</span></div><section class="gis-toolbar"><label>Search<input id="gisQuery" type="search" placeholder="Address, city, ID, layer, status"></label><label>Layer<select id="gisLayer"><option value="">All layers</option>${layers}</select></label><label>Status<select id="gisStatus"><option value="">All statuses</option>${statuses}</select></label><button id="gisSearchButton" class="primary-button">Map</button></section><div class="gis-meta"><span id="gisCounts"></span><span>Source: <strong id="gisSource"></strong></span></div><section class="gis-layout"><div id="gisMap" class="gis-map"></div><aside id="gisDetail" class="gis-detail" aria-live="polite"></aside></section>`;$('gisSearchButton').addEventListener('click',runGisSearch);$('gisQuery').addEventListener('keydown',e=>{if(e.key==='Enter')runGisSearch();});bindGisWorkspace(d);}


function aiEscList(items){return (items||[]).map(x=>`<li>${esc(x)}</li>`).join('');}
function renderAiContext(data){const target=$('aiContext');if(!target)return;target.innerHTML=`<h2>Grounding Sources</h2><div class="ai-context-list">${(data.sources||[]).map(s=>`<div class="ai-context-item"><div><strong>${esc(s.label)}</strong><br><span>${esc(s.detail)}</span></div><span class="pill">${esc(s.status)}</span></div>`).join('')}</div><p class="ai-disclosure">Provider: ${esc(data.provider||'SCIIP_CONTEXT_ENGINE')}<br>Alpha mode uses deterministic SCIIP context and does not invoke an external generative model.</p><h3>Prompt History</h3><div id="aiHistory" class="ai-history"><div class="ai-history-item"><small>No prompts submitted in this session.</small></div></div>`;}
function renderAiResponse(data){const target=$('aiResponse');if(!target)return;target.innerHTML=`<article class="ai-answer"><p class="eyebrow">${esc(data.intent)} · ${esc(data.confidence)} confidence</p><h2>Grounded Response</h2><p>${esc(data.summary)}</p>${(data.recommendations||[]).length?`<h3>Recommended next steps</h3><ul>${aiEscList(data.recommendations)}</ul>`:''}<p class="ai-disclosure">${esc(data.grounding&&data.grounding.disclaimer||'')}</p></article>${(data.evidence||[]).length?`<div class="ai-evidence-grid">${data.evidence.map(e=>`<article class="ai-evidence"><h3>${esc(e.title)}</h3><small>${esc(e.subtitle||'')}</small><div class="ai-metrics">${(e.metrics||[]).map(m=>`<div class="ai-metric"><span>${esc(m.label)}</span><strong>${esc(m.value)}</strong></div>`).join('')}</div><small>Source: ${esc(e.source||'SCIIP')}</small></article>`).join('')}</div>`:''}`;}
function addAiHistory(prompt,intent){const h=$('aiHistory');if(!h)return;const item=document.createElement('div');item.className='ai-history-item';item.innerHTML=`<strong>${esc(prompt)}</strong><br><small>${esc(intent||'Completed')}</small>`;if(h.firstElementChild&&h.firstElementChild.textContent.indexOf('No prompts')!==-1)h.innerHTML='';h.prepend(item);}
function runAiPrompt(promptValue){const prompt=String(promptValue||$('aiPrompt').value||'').trim();if(!prompt)return;const button=$('aiAskButton');button.disabled=true;button.textContent='Analyzing…';$('aiResponse').innerHTML='<div class="state-panel">Grounding request across SCIIP services…</div>';const done=data=>{renderAiResponse(data);addAiHistory(prompt,data.intent);button.disabled=false;button.textContent='Ask SCIIP';};const fail=error=>{button.disabled=false;button.textContent='Ask SCIIP';$('aiResponse').innerHTML='<div class="state-panel error">AI Workspace request failed: '+esc(error&&error.message||error)+'</div>';};if(window.google&&google.script&&google.script.run){google.script.run.withSuccessHandler(done).withFailureHandler(fail).sciipAiWorkspaceAsk({prompt});}else{fail('Apps Script bridge unavailable.');}}
function renderAiWorkspace(){const d=state.aiWorkspace||{sources:[],suggestedPrompts:[]};$('workspaceContent').innerHTML=`<div class="workspace-toolbar"><strong>AI Workspace</strong><span class="pill">GROUNDED ALPHA</span></div><section class="ai-layout"><div class="ai-main"><div class="ai-composer"><label>Ask SCIIP<textarea id="aiPrompt" maxlength="${Number(d.maxPromptLength||2000)}" placeholder="Ask about properties, relationships, GIS context, or platform health."></textarea></label><button id="aiAskButton" class="primary-button">Ask SCIIP</button></div><div class="ai-suggestions">${(d.suggestedPrompts||[]).map(p=>`<button class="ai-suggestion" data-ai-prompt="${esc(p)}">${esc(p)}</button>`).join('')}</div><div id="aiResponse" class="ai-response"><div class="workspace-placeholder"><h2>Grounded intelligence workspace</h2><p>Responses are assembled from connected SCIIP Property, Graph, GIS, and platform contexts.</p></div></div></div><aside id="aiContext" class="ai-context"></aside></section>`;renderAiContext(d);$('aiAskButton').addEventListener('click',()=>runAiPrompt());$('aiPrompt').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')runAiPrompt();});document.querySelectorAll('[data-ai-prompt]').forEach(b=>b.addEventListener('click',()=>{$('aiPrompt').value=b.dataset.aiPrompt;runAiPrompt(b.dataset.aiPrompt);}));}

function selectView(id){const w=workspace(id);if(!w)return;state.activeWorkspace=w.id;$('viewTitle').textContent=w.label;$('viewDescription').textContent=w.description;document.querySelectorAll('[data-view]').forEach(b=>b.setAttribute('aria-current',b.dataset.view===w.id?'page':'false'));if(w.id==='executive-dashboard'){renderExecutiveDashboard();}else if(w.id==='property-explorer'){renderPropertyExplorer();}else if(w.id==='knowledge-graph'){renderKnowledgeGraph();}else if(w.id==='gis-workspace'){renderGisWorkspace();}else if(w.id==='ai-workspace'){renderAiWorkspace();}else{$('workspaceContent').innerHTML=`<div class="workspace-toolbar"><strong>${esc(w.label)}</strong><span class="pill">ALPHA CONTRACT READY</span></div><div class="workspace-placeholder"><h2>${esc(w.label)}</h2><p>${esc(w.description)}</p><p class="summary-detail">This workspace is connected to the SCIIP Desktop shell and ready for its functional module build.</p></div>`;}history.replaceState(null,'','?view='+encodeURIComponent(w.id));}
function toggleMenu(force){const open=force===undefined?!sidebar.classList.contains('open'):force;sidebar.classList.toggle('open',open);$('menuButton').setAttribute('aria-expanded',String(open));}
try{renderNav();renderSummary();renderActivity();selectView(state.activeWorkspace);nav.addEventListener('click',e=>{const b=e.target.closest('[data-view]');if(b){selectView(b.dataset.view);if(innerWidth<701)toggleMenu(false);}});$('menuButton').addEventListener('click',()=>toggleMenu());$('refreshButton').addEventListener('click',()=>{renderSummary();renderActivity();selectView(state.activeWorkspace);});$('notificationButton').addEventListener('click',()=>{$('notificationDrawer').hidden=!$('notificationDrawer').hidden;});app.dataset.state='ready';}catch(error){$('errorState').hidden=false;$('errorState').textContent='SCIIP Desktop failed to initialize: '+error.message;$('systemStatus').textContent='ERROR';app.dataset.state='error';}
})();
</script>
