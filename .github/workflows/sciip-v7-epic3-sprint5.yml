name: SCIIP v7 Epic 3 Sprint 5
on:
  workflow_dispatch:
  push:
    paths:
      - 'src/applications/relationship-intelligence/**'
      - 'tools/tests/sciip-epic3-sprint5-test.js'
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node tools/tests/sciip-epic3-sprint5-test.js
