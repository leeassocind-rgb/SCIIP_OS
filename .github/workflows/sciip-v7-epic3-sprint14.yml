name: SCIIP v7 Epic 3 Sprint 14 Certification
on:
  push:
    branches: [v7.0-sciip-desktop-recovery]
  pull_request:
  workflow_dispatch:
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run test:epic3:sprint14
