name: SCIIP v7 Epic 3 Sprint 10
on:
  push:
    paths:
      - 'src/applications/relationship-intelligence/**'
      - 'tools/tests/sciip-epic3-sprint10-test.js'
      - '.github/workflows/sciip-v7-epic3-sprint10.yml'
  pull_request:
    paths:
      - 'src/applications/relationship-intelligence/**'
      - 'tools/tests/sciip-epic3-sprint10-test.js'
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run test:epic3:sprint10
