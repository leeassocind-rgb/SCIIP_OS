name: SCIIP v7 Sprint 24 Certification
on: [push, pull_request]
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run test:sprint24
      - run: npm run deployment:compile
