name: SCIIP Architecture Gate
on:
  push:
  pull_request:
jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run architecture:report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sciip-architecture-report
          path: governance/architecture-report.json
