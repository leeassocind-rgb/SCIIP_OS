name: SCIIP v7 Integration Sprint 1
on:
  push:
    branches: [main, v7.0-sciip-desktop]
  pull_request:
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - run: npm run certification:integration-sprint1
      - run: npm run deployment:compile:test
      - run: npm run architecture:validate
