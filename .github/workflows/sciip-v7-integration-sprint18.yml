name: SCIIP v7 Sprint 18 Certification
on:
  push:
    branches: [v7.0-sciip-desktop]
  pull_request:
    branches: [v7.0-sciip-desktop]
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run test:sprint18
      - run: npm run deployment:compile
