name: SCIIP v7 Sprint 21 Certification
on:
  push:
    paths:
      - 'src/applications/enterprise-portfolio-strategy-optimization/**'
      - 'src/tests/SCIIP_TestingFramework_v7_IntegrationSprint21.gs'
      - 'tools/tests/sciip-integration-sprint21-test.js'
  workflow_dispatch:
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run test:sprint21
      - run: npm run deployment:compile
