name: SCIIP v7 Epic 3 Sprint 8
on:
  push:
    paths:
      - 'src/applications/relationship-intelligence/**'
      - 'tools/tests/sciip-epic3-sprint8-test.js'
      - 'manifests/SCIIP_V7_EPIC3_SPRINT8_AUTONOMOUS_OPPORTUNITY_DISCOVERY.json'
  pull_request:
    paths:
      - 'src/applications/relationship-intelligence/**'
      - 'tools/tests/sciip-epic3-sprint8-test.js'
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - run: node tools/tests/sciip-epic3-sprint8-test.js
