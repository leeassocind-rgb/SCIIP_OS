name: SCIIP Production Certification
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      profile:
        description: Certification profile
        required: true
        default: foundation
        type: choice
        options: [foundation, production]
permissions:
  contents: read
jobs:
  certify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Foundation certification
        if: github.event_name != 'workflow_dispatch' || inputs.profile == 'foundation'
        run: npm run certification:foundation
      - name: Strict production certification
        if: github.event_name == 'workflow_dispatch' && inputs.profile == 'production'
        run: npm run certification:production
      - name: Upload certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sciip-production-certification
          path: |
            governance/production-certification-*.json
            governance/production-certification-*.md
            governance/architecture-governance-report.json
            governance/repository-governance-report.json
