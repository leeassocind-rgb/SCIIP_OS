name: SCIIP Recovery Certification
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Recovery certification
        run: npm run certification:recovery
      - name: Upload recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sciip-recovery-certification
          path: governance/recovery-certification.json
