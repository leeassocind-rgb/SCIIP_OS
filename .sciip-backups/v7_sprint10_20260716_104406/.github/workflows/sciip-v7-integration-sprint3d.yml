name: SCIIP v7 Integration Sprint 3D
on:
  push:
    branches: [v7.0-sciip-desktop]
  pull_request:
  workflow_dispatch:
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run certification:integration-sprint3d
      - run: npm run deployment:compile:test
      - run: npm run architecture:validate
