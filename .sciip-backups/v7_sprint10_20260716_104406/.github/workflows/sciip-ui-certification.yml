name: SCIIP UI Certification
on:
  push:
    branches: [main]
  pull_request:
jobs:
  certify-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run certification:ui
      - uses: actions/upload-artifact@v4
        with:
          name: sciip-ui-certification
          path: governance/ui-certification.json
