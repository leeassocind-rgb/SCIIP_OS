name: SCIIP v7 Integration Sprint 2B
on: [push, pull_request]
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run certification:integration-sprint2b
      - run: npm run certification:fast
      - run: npm run deployment:compile:test
      - run: npm run architecture:validate
