<!doctype html><html lang="en"><head><base target="_top"><meta charset="utf-8"><title>SCIIP</title>
<style>
:root{--ink:#101828;--muted:#667085;--line:#e4e7ec;--panel:#fff;--bg:#f7f8fa;--nav:#111827;--accent:#2563eb;--good:#067647;--warn:#b54708}*{box-sizing:border-box}body{margin:0;font:14px Inter,Arial,sans-serif;color:var(--ink);background:var(--bg)}.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.nav{background:var(--nav);color:#fff;padding:24px 16px;position:sticky;top:0;height:100vh}.brand{font-size:22px;font-weight:800;letter-spacing:.04em}.tag{color:#98a2b3;font-size:11px;margin:4px 0 28px}.nav button{width:100%;border:0;background:transparent;color:#d0d5dd;text-align:left;padding:11px 12px;border-radius:8px;margin:2px 0;cursor:pointer}.nav button:hover,.nav button.active{background:#263244;color:#fff}.main{padding:28px 34px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.top h1{margin:0;font-size:28px}.user{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}.metric{font-size:28px;font-weight:750;margin:8px 0}.muted{color:var(--muted)}.layout{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-top:16px}.button{border:0;border-radius:8px;padding:10px 14px;font-weight:650;cursor:pointer}.primary{background:var(--accent);color:#fff}.secondary{background:#eef2f6;color:var(--ink)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.quality{font-size:48px;font-weight:800;color:var(--good)}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:10px;border-bottom:1px solid var(--line);font-size:13px}.pill{display:inline-block;border-radius:999px;padding:4px 8px;background:#eef2f6;font-size:11px;font-weight:700}.empty{padding:42px;text-align:center;color:var(--muted)}@media(max-width:900px){.app{grid-template-columns:1fr}.nav{height:auto;position:static}.grid{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.main{padding:20px}}@media(max-width:560px){.grid{grid-template-columns:1fr}}
</style></head><body><div class="app"><aside class="nav"><div class="brand">SCIIP</div><div class="tag">INDUSTRIAL REAL ESTATE OS</div><nav id="nav"></nav></aside><main class="main"><header class="top"><div><h1 id="title"></h1><div id="description" class="muted"></div></div><div class="user" id="user"></div></header><section id="content"></section></main></div>
<script>window.SCIIP_BOOTSTRAP=<?!= bootstrapJson ?>;</script><script>
(function(){const s=window.SCIIP_BOOTSTRAP||{},$=x=>document.getElementById(x),esc=v=>String(v==null?'':v).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));function nav(){ $('nav').innerHTML=s.workspaces.map(w=>`<button data-v="${w.id}" class="${w.id===s.activeWorkspace?'active':''}">${esc(w.label)}</button>`).join('');document.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>render(b.dataset.v));}function cards(items){return `<div class="grid">${items.map(x=>`<article class="card"><div class="muted">${esc(x.label)}</div><div class="metric">${esc(x.value)}</div><div class="muted">${esc(x.detail)}</div></article>`).join('')}</div>`;}function dashboard(){return cards(s.dashboard.kpis)+`<div class="layout"><article class="panel"><h2>Monday Morning Priorities</h2><p>Review new market data, resolve exceptions, and publish trusted property updates.</p><button class="button primary" data-go="data-sources">Open Data Sources</button></article><article class="panel"><h2>Platform</h2><p><strong>${esc(s.product)}</strong> application</p><p class="muted">Powered by ${esc(s.platform)}</p></article></div>`;}function dataSources(){const d=s.dataSources,c=d.counts,j=d.jobs||[];return cards([{label:'Data Quality',value:d.qualityScore+'%',detail:c.errors+' errors · '+c.warnings+' warnings'},{label:'Import Jobs',value:c.jobs,detail:c.records+' staged records'},{label:'Commits',value:c.commits,detail:'Governed transactions'},{label:'Historical Supersheets',value:'Ready',detail:'Batch queue available'}])+`<div class="layout"><article class="panel"><h2>Data Sources</h2><div class="toolbar"><button class="button primary" id="activeSheet">Create from active sheet</button><button class="button secondary" id="refresh">Refresh</button></div><h3>Recent imports</h3>${j.length?`<table><thead><tr><th>Job</th><th>Source</th><th>Status</th><th>Created</th></tr></thead><tbody>${j.map(r=>`<tr><td>${esc(r.jobId||r.Job_ID||'—')}</td><td>${esc(r.sourceType||r.Source_Type||r.source||'Unknown')}</td><td><span class="pill">${esc(r.status||'Unknown')}</span></td><td>${esc(r.createdAt||r.Created_At||'')}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">No persisted import jobs yet.</div>'}</article><aside class="panel"><h2>Historical migration</h2><div class="quality">${esc(d.historicalBacklog.queueRemaining!=null?d.historicalBacklog.queueRemaining:d.historicalBacklog.status)}</div><p class="muted">Queued files remaining</p><div class="toolbar"><input id="folderId" placeholder="Google Drive folder ID" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:8px"><input id="waveSize" type="number" min="1" max="50" value="10" style="width:90px;padding:10px;border:1px solid var(--line);border-radius:8px"><button class="button primary" id="registerFolder">Register folder</button></div><p>${esc(d.historicalBacklog.totalFiles||0)} files · ${esc(d.historicalBacklog.totalWaves||0)} waves · ${esc(d.historicalBacklog.awaitingReview||0)} awaiting review</p><p class="muted">Files are ordered chronologically and staged in controlled waves. Nothing commits automatically.</p></aside></div>`;}function aiCopilot(){const a=s.aiCopilot||{};return `<div class="layout"><article class="panel"><h2>Industrial AI Copilot</h2><p class="muted">Grounded answers from SCIIP canonical knowledge, Digital Twins, spatial analysis, and governed events.</p><textarea id="aiQuestion" rows="5" style="width:100%;padding:12px;border:1px solid var(--line);border-radius:8px" placeholder="Ask SCIIP about properties, competition, market changes, or site requirements…"></textarea><div class="toolbar"><button class="button primary" id="askAI">Ask SCIIP</button></div><div id="aiAnswer" class="panel" style="display:none;margin-top:12px"></div></article><aside class="panel"><h2>Suggested prompts</h2>${(a.suggestedPrompts||[]).map(x=>`<button class="button secondary aiPrompt" style="width:100%;margin:4px 0;text-align:left">${esc(x)}</button>`).join('')}<p class="muted" style="margin-top:16px">Grounded-only mode is enabled. External model generation is disabled in this sprint.</p></aside></div>`;}function placeholder(w){return `<article class="panel"><h2>${esc(w.label)}</h2><p>${esc(w.description)}</p><div class="empty">Application contract ready for the next functional release.</div></article>`;}function render(id){const w=s.workspaces.find(x=>x.id===id)||s.workspaces[0];s.activeWorkspace=w.id;$('title').textContent=w.label;$('description').textContent=w.description;document.querySelectorAll('[data-v]').forEach(b=>b.classList.toggle('active',b.dataset.v===w.id));$('content').innerHTML=id==='dashboard'?dashboard():id==='data-sources'?dataSources():id==='ai-copilot'?aiCopilot():placeholder(w);history.replaceState(null,'','?view='+encodeURIComponent(w.id));document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>render(b.dataset.go));const a=$('activeSheet');if(a)a.onclick=()=>{a.disabled=true;a.textContent='Creating…';if(window.google&&google.script)google.script.run.withSuccessHandler(()=>location.reload()).withFailureHandler(e=>{alert(e.message||e);a.disabled=false;a.textContent='Create from active sheet';}).sciipCreateIndustrialDataImportJobFromActiveSheet();};const r=$('refresh');if(r)r.onclick=()=>location.reload();document.querySelectorAll('.aiPrompt').forEach(b=>b.onclick=()=>{const q=$('aiQuestion');if(q)q.value=b.textContent;});const ask=$('askAI');if(ask)ask.onclick=()=>{const q=$('aiQuestion').value.trim(),out=$('aiAnswer');if(!q){alert('Enter a question.');return;}ask.disabled=true;ask.textContent='Analyzing…';google.script.run.withSuccessHandler(r=>{out.style.display='block';out.innerHTML=`<h3>Answer</h3><p>${esc(r.answer)}</p><p><span class="pill">${esc(r.intent)}</span> <span class="pill">Confidence ${esc(r.confidence)}%</span></p><h4>Evidence</h4>${(r.evidence||[]).map(e=>`<div style="padding:8px 0;border-bottom:1px solid var(--line)"><strong>${esc(e.title)}</strong><div class="muted">${esc((e.reasons||[]).join(' · '))}</div></div>`).join('')||'<div class="muted">No governed evidence found.</div>'}`;ask.disabled=false;ask.textContent='Ask SCIIP';}).withFailureHandler(e=>{alert(e.message||e);ask.disabled=false;ask.textContent='Ask SCIIP';}).sciipIndustrialAICopilotAsk({question:q,properties:[]});};const rf=$('registerFolder');if(rf)rf.onclick=()=>{const folder=$('folderId').value.trim(),size=Number($('waveSize').value||10);if(!folder){alert('Enter a Google Drive folder ID.');return;}rf.disabled=true;rf.textContent='Registering…';google.script.run.withSuccessHandler(x=>{alert('Registered '+x.files+' files in '+x.waves+' waves.');location.reload();}).withFailureHandler(e=>{alert(e.message||e);rf.disabled=false;rf.textContent='Register folder';}).sciipRegisterHistoricalSupersheetFolder(folder,size);};} $('user').textContent=s.session.user;nav();render(s.activeWorkspace);})();
</script></body></html>
