name: SCIIP v7 Integration Sprint 3A
on:
  push:
    branches: [v7.0-sciip-desktop]
  pull_request:
    branches: [v7.0-sciip-desktop]
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run certification:integration-sprint3a
      - run: npm run deployment:compile:test
      - run: npm run architecture:validate
