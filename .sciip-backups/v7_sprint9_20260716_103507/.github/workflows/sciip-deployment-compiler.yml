name: SCIIP Deployment Compiler
on:
  pull_request:
  push:
    branches: [main, v7.0-sciip-desktop]
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run deployment:test
      - uses: actions/upload-artifact@v4
        with:
          name: sciip-apps-script-dist
          path: |
            dist/apps-script
            dist/reports/deployment-compiler-report.json
