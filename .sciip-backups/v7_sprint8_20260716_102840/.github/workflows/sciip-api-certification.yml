name: SCIIP API Certification
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  api-certification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run certification:api
      - uses: actions/upload-artifact@v4
        with:
          name: sciip-api-certification
          path: governance/api-certification.json
