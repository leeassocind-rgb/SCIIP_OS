name: SCIIP GIS Workspace Alpha
on:
  push:
    branches: [main, v7.0-sciip-desktop]
  pull_request:
    branches: [main, v7.0-sciip-desktop]
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node tools/tests/sciip-gis-workspace-alpha-v7-test.js
