<style>
.ai-layout{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(290px,.65fr);gap:16px;min-height:560px}
.ai-main,.ai-context{border:1px solid var(--border);border-radius:18px;background:var(--surface);padding:18px}
.ai-composer{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
.ai-composer label{display:grid;gap:7px;font-size:12px;font-weight:700;color:var(--muted)}
.ai-composer textarea{min-height:88px;resize:vertical;border:1px solid var(--border);border-radius:12px;padding:12px;background:var(--surface-2);color:var(--text);font:inherit}
.ai-suggestions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 16px}.ai-suggestion{border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:999px;padding:8px 11px;cursor:pointer}
.ai-response{display:grid;gap:14px}.ai-answer{border:1px solid var(--border);border-radius:16px;padding:18px;background:var(--surface-2)}.ai-answer h2{margin:4px 0 8px}.ai-answer p{line-height:1.55}
.ai-evidence-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.ai-evidence{border:1px solid var(--border);border-radius:12px;padding:13px;background:var(--surface)}.ai-evidence h3{font-size:15px;margin:0 0 4px}.ai-evidence small{color:var(--muted)}
.ai-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}.ai-metric{background:var(--surface-2);border-radius:8px;padding:8px}.ai-metric span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase}.ai-metric strong{font-size:12px;word-break:break-word}
.ai-context-list,.ai-history{display:grid;gap:8px}.ai-context-item,.ai-history-item{border:1px solid var(--border);border-radius:11px;padding:11px;background:var(--surface-2)}.ai-context-item{display:flex;justify-content:space-between;gap:10px}.ai-context-item span,.ai-history-item small{color:var(--muted)}
.ai-disclosure{font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:12px;margin-top:14px}
@media(max-width:900px){.ai-layout{grid-template-columns:1fr}.ai-context{min-height:220px}}
@media(max-width:620px){.ai-composer{grid-template-columns:1fr}.ai-evidence-grid{grid-template-columns:1fr}.ai-metrics{grid-template-columns:1fr}}
</style>
