<script>
(function(){'use strict';
const TYPES={PROPERTY_SELECTED:'PROPERTY_SELECTED',COMPANY_SELECTED:'COMPANY_SELECTED',MARKET_SELECTED:'MARKET_SELECTED',GRAPH_NODE_SELECTED:'GRAPH_NODE_SELECTED',MAP_FEATURE_SELECTED:'MAP_FEATURE_SELECTED',WORKSPACE_CHANGED:'WORKSPACE_CHANGED',SEARCH_CHANGED:'SEARCH_CHANGED',FILTER_CHANGED:'FILTER_CHANGED',CONTEXT_CLEARED:'CONTEXT_CLEARED',NOTIFICATION_CREATED:'NOTIFICATION_CREATED'};
const defaults={selectedProperty:null,selectedCompany:null,selectedMarket:null,selectedGraphNode:null,selectedMapFeature:null,currentWorkspace:(window.SCIIP_BOOTSTRAP||{}).activeWorkspace||'executive-dashboard',globalSearchText:'',activeFilters:{},mapExtent:null,userSession:(window.SCIIP_BOOTSTRAP||{}).session||null,loading:{active:false,scope:null,message:null},error:null,notifications:((window.SCIIP_BOOTSTRAP||{}).notifications||[]),revision:0};
let state=Object.assign({},defaults),subs=new Map(),eventSubs=new Map(),seq=0,history=[],searchHits=[],activeHit=-1;
const clone=v=>v==null?v:JSON.parse(JSON.stringify(v));
const escapeHtml=v=>String(v==null?'':v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const store={get:k=>k?clone(state[k]):clone(state),set:(k,v)=>store.patch({[k]:v}),patch:p=>{const prev=state;state=Object.assign({},state,clone(p),{revision:(state.revision||0)+1,updatedAt:new Date().toISOString()});subs.forEach(fn=>{try{fn({state:clone(state),previous:clone(prev),changedKeys:Object.keys(p)})}catch(e){}});persist();renderAll();return clone(state)},subscribe:fn=>{const id='s'+(++seq);subs.set(id,fn);return id},unsubscribe:id=>subs.delete(id),reset:()=>{state=clone(defaults);persist();renderAll();return clone(state)},snapshot:()=>clone(state),restore:s=>{state=Object.assign({},defaults,clone(s||{}));persist();renderAll();return clone(state)}};
const events={publish:(type,payload,meta)=>{const e={id:'e'+(++seq),type,payload:clone(payload||{}),meta:clone(meta||{}),timestamp:new Date().toISOString()};history.push(e);history=history.slice(-200);eventSubs.forEach(s=>{if(s.type==='*'||s.type===type){try{s.fn(clone(e))}catch(err){}if(s.once)eventSubs.delete(s.id)}});return clone(e)},subscribe:(type,fn)=>{const id='e'+(++seq);eventSubs.set(id,{id,type,fn,once:false});return id},once:(type,fn)=>{const id=events.subscribe(type,fn);eventSubs.get(id).once=true;return id},unsubscribe:id=>eventSubs.delete(id),history:()=>clone(history)};
function persist(){try{sessionStorage.setItem('SCIIP_APP_STATE',JSON.stringify(state))}catch(e){}}
function restore(){try{const saved=JSON.parse(sessionStorage.getItem('SCIIP_APP_STATE')||'null');if(saved)state=Object.assign({},defaults,saved)}catch(e){}}
function entity(v,type){if(!v)return null;const id=v.propertyId||v.companyId||v.marketId||v.nodeId||v.featureId||v.id;return {id,label:v.label||v.address||v.name||id,entityType:type,data:clone(v)}}
function extentFor(v){const d=(v&&v.data)||v||{},lat=Number(d.latitude||d.lat||0),lng=Number(d.longitude||d.lng||d.long||0);return lat&&lng?{centerLatitude:lat,centerLongitude:lng,zoomHint:14}:null}
events.subscribe('*',e=>{const p=e.payload||{},patch={};if(e.type===TYPES.PROPERTY_SELECTED){const x=entity(p.property||p,'PROPERTY');Object.assign(patch,{selectedProperty:x,selectedGraphNode:x&&{id:x.id,label:x.label,entityType:'PROPERTY',data:clone(x.data)},selectedMapFeature:x&&{id:x.id,label:x.label,entityType:'PROPERTY',data:clone(x.data)},mapExtent:extentFor(x)})}else if(e.type===TYPES.COMPANY_SELECTED)patch.selectedCompany=entity(p.company||p,'COMPANY');else if(e.type===TYPES.MARKET_SELECTED)patch.selectedMarket=entity(p.market||p,'MARKET');else if(e.type===TYPES.GRAPH_NODE_SELECTED)patch.selectedGraphNode=entity(p.node||p,'GRAPH_NODE');else if(e.type===TYPES.MAP_FEATURE_SELECTED){const x=entity(p.feature||p,'MAP_FEATURE');patch.selectedMapFeature=x;patch.mapExtent=extentFor(x)}else if(e.type===TYPES.WORKSPACE_CHANGED)patch.currentWorkspace=p.workspaceId||'executive-dashboard';else if(e.type===TYPES.SEARCH_CHANGED)patch.globalSearchText=p.text||'';else if(e.type===TYPES.FILTER_CHANGED)patch.activeFilters=clone(p.filters||{});else if(e.type===TYPES.CONTEXT_CLEARED)Object.assign(patch,{selectedProperty:null,selectedCompany:null,selectedMarket:null,selectedGraphNode:null,selectedMapFeature:null,mapExtent:null});else if(e.type===TYPES.NOTIFICATION_CREATED){const notes=(state.notifications||[]).slice();notes.push(clone(p));patch.notifications=notes.slice(-100)}if(Object.keys(patch).length)store.patch(patch)});
function selected(){return state.selectedProperty||state.selectedCompany||state.selectedMarket||state.selectedGraphNode||state.selectedMapFeature}
function renderContext(){const bar=document.getElementById('contextBar'),crumb=document.getElementById('breadcrumbs'),label=document.getElementById('selectedContext');if(!bar)return;const x=selected(),workspace=String(state.currentWorkspace||'executive-dashboard').replace(/-/g,' ');crumb.innerHTML=['SCIIP',workspace,x&&x.label].filter(Boolean).map(escapeHtml).join(' <span aria-hidden="true">/</span> ');label.textContent=x?(x.entityType+': '+x.label):'No selected context';bar.dataset.hasContext=x?'true':'false'}
function renderIndicators(){const loading=document.getElementById('integrationLoading'),error=document.getElementById('integrationError');if(loading){loading.hidden=!(state.loading&&state.loading.active);loading.textContent=(state.loading&&state.loading.message)||'Loading…'}if(error){error.hidden=!state.error;error.textContent=state.error?(state.error.message||String(state.error)):''}}
function renderNotifications(){const button=document.getElementById('notificationButton'),drawer=document.getElementById('notificationDrawer'),items=state.notifications||[];if(button){button.dataset.count=String(items.length);button.setAttribute('aria-label','Open notifications, '+items.length+' available')}if(drawer&&!drawer.hidden){drawer.innerHTML='<div class="drawer-header"><strong>Notifications</strong><button id="closeNotificationDrawer" class="icon-button" aria-label="Close notifications">×</button></div>'+(items.length?items.slice().reverse().map(n=>`<article class="notification-item"><strong>${escapeHtml(n.title||n.severity||'Notification')}</strong><p>${escapeHtml(n.detail||n.message||'')}</p></article>`).join(''):'<div class="empty-notifications">No notifications</div>');drawer.querySelector('#closeNotificationDrawer').onclick=()=>{drawer.hidden=true}}}
function renderAll(){renderContext();renderIndicators();renderNotifications()}
function collectSearch(){const b=window.SCIIP_BOOTSTRAP||{},out=[];function add(list,type,source){(list||[]).forEach(x=>{const id=x.propertyId||x.companyId||x.marketId||x.nodeId||x.featureId||x.id,label=x.label||x.address||x.name||id;if(id&&label)out.push({entityId:String(id),label:String(label),entityType:type,sourceWorkspace:source,supportingDetail:[x.city,x.type,x.status,x.layer].filter(Boolean).join(' · '),entity:x})})}const properties=b.propertyExplorer||{};add(properties.properties||properties.results||properties.items,'PROPERTY','property-explorer');const graph=b.knowledgeGraph||{};add(graph.nodes,'GRAPH_NODE','knowledge-graph');(graph.nodes||[]).filter(n=>String(n.type||'').toLowerCase()==='company').forEach(n=>add([n],'COMPANY','knowledge-graph'));(graph.nodes||[]).filter(n=>String(n.type||'').toLowerCase()==='market').forEach(n=>add([n],'MARKET','knowledge-graph'));const gis=b.gisWorkspace||{};add(gis.features,'MAP_FEATURE','gis-workspace');return out}
function eventFor(type){return type==='PROPERTY'?TYPES.PROPERTY_SELECTED:type==='COMPANY'?TYPES.COMPANY_SELECTED:type==='MARKET'?TYPES.MARKET_SELECTED:type==='GRAPH_NODE'?TYPES.GRAPH_NODE_SELECTED:TYPES.MAP_FEATURE_SELECTED}
function workspaceFor(hit){return hit.entityType==='PROPERTY'?'property-explorer':hit.entityType==='COMPANY'||hit.entityType==='GRAPH_NODE'?'knowledge-graph':hit.entityType==='MARKET'||hit.entityType==='MAP_FEATURE'?'gis-workspace':hit.sourceWorkspace}
function selectHit(hit){if(!hit)return;const type=eventFor(hit.entityType),key=hit.entityType==='PROPERTY'?'property':hit.entityType==='COMPANY'?'company':hit.entityType==='MARKET'?'market':hit.entityType==='GRAPH_NODE'?'node':'feature';events.publish(type,{[key]:hit.entity},{source:'GLOBAL_SEARCH'});const workspace=workspaceFor(hit);events.publish(TYPES.WORKSPACE_CHANGED,{workspaceId:workspace},{source:'GLOBAL_SEARCH'});document.querySelector(`[data-view="${workspace}"]`)?.click();const box=document.getElementById('globalSearchResults');if(box)box.hidden=true}
function renderSearch(q){const box=document.getElementById('globalSearchResults');if(!box)return;if(!q){box.hidden=true;box.innerHTML='';searchHits=[];activeHit=-1;return}const needle=q.toLowerCase(),seen=new Set();searchHits=collectSearch().filter(x=>{const key=x.entityType+'|'+x.entityId,hay=(x.label+' '+x.entityId+' '+x.entityType+' '+x.supportingDetail).toLowerCase();if(seen.has(key)||!hay.includes(needle))return false;seen.add(key);return true}).slice(0,12);activeHit=searchHits.length?0:-1;box.innerHTML=searchHits.length?searchHits.map((x,i)=>`<button role="option" aria-selected="${i===activeHit}" data-global-result="${i}" class="${i===activeHit?'active':''}"><strong>${escapeHtml(x.label)}</strong><small>${escapeHtml(x.entityType)} · ${escapeHtml(x.sourceWorkspace)}${x.supportingDetail?' · '+escapeHtml(x.supportingDetail):''}</small></button>`).join(''):'<div class="global-search-empty">No integrated matches.</div>';box.hidden=false;box.querySelectorAll('[data-global-result]').forEach(btn=>btn.onclick=()=>selectHit(searchHits[Number(btn.dataset.globalResult)]))}
function moveHit(delta){if(!searchHits.length)return;activeHit=(activeHit+delta+searchHits.length)%searchHits.length;document.querySelectorAll('[data-global-result]').forEach((el,i)=>{el.classList.toggle('active',i===activeHit);el.setAttribute('aria-selected',String(i===activeHit));if(i===activeHit)el.scrollIntoView({block:'nearest'})})}
restore();window.SCIIP_APP_STATE=store;window.SCIIP_APP_EVENTS=events;window.SCIIP_APP_EVENT_TYPES=TYPES;window.SCIIP_APP_INTEGRATION_CLIENT={VERSION:'v7.0-integration-sprint-1b',selectSearchResult:selectHit,render:renderAll};
document.addEventListener('click',e=>{const property=e.target.closest('[data-property-id]');if(property){const id=property.dataset.propertyId,list=((window.SCIIP_BOOTSTRAP||{}).propertyExplorer||{}).properties||[];events.publish(TYPES.PROPERTY_SELECTED,{property:list.find(x=>String(x.propertyId)===String(id))||{propertyId:id}})}const graph=e.target.closest('[data-node-id]');if(graph)events.publish(TYPES.GRAPH_NODE_SELECTED,{node:{nodeId:graph.dataset.nodeId,label:graph.dataset.nodeLabel||graph.dataset.nodeId}});const feature=e.target.closest('[data-feature-id]');if(feature)events.publish(TYPES.MAP_FEATURE_SELECTED,{feature:{featureId:feature.dataset.featureId,label:feature.dataset.featureLabel||feature.dataset.featureId}});const view=e.target.closest('[data-view]');if(view)events.publish(TYPES.WORKSPACE_CHANGED,{workspaceId:view.dataset.view})});
document.getElementById('clearContextButton')?.addEventListener('click',()=>events.publish(TYPES.CONTEXT_CLEARED,{}));
const search=document.getElementById('globalSearch');search?.addEventListener('input',e=>{events.publish(TYPES.SEARCH_CHANGED,{text:e.target.value});renderSearch(e.target.value)});search?.addEventListener('keydown',e=>{if(e.key==='ArrowDown'){e.preventDefault();moveHit(1)}else if(e.key==='ArrowUp'){e.preventDefault();moveHit(-1)}else if(e.key==='Enter'&&activeHit>=0){e.preventDefault();selectHit(searchHits[activeHit])}else if(e.key==='Escape'){document.getElementById('globalSearchResults').hidden=true}});
document.getElementById('notificationButton')?.addEventListener('click',()=>{const drawer=document.getElementById('notificationDrawer');drawer.hidden=!drawer.hidden;renderNotifications()});renderAll();
})();
</script>
