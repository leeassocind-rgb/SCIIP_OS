<style>
.integration-bar{display:grid;grid-template-columns:minmax(180px,1fr) minmax(220px,2fr) auto;gap:12px;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border,#d8dee8);background:var(--surface,#fff);position:relative}.breadcrumbs{font-size:12px;text-transform:capitalize;color:var(--muted,#667085)}.context-selection{font-size:13px;font-weight:650}.global-search-wrap{position:relative}.global-search-wrap input{width:100%;min-height:44px}.global-search-results{position:absolute;z-index:20;top:48px;left:0;right:0;background:#fff;border:1px solid #d8dee8;box-shadow:0 12px 30px rgba(16,24,40,.14);max-height:320px;overflow:auto}.global-search-results button{display:flex;width:100%;padding:10px 12px;border:0;border-bottom:1px solid #eef1f6;background:#fff;text-align:left;flex-direction:column;min-height:44px}.global-search-results small{color:#667085}.global-search-empty{padding:12px;color:#667085}.context-actions{display:flex;gap:8px}.context-actions button{min-height:44px}@media(max-width:767px){.integration-bar{grid-template-columns:1fr auto;padding:8px 12px}.global-search-wrap{grid-column:1/-1;grid-row:2}.breadcrumbs{display:none}.context-selection{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}}
</style>
<style>
.integration-indicators{display:flex;align-items:center;gap:.5rem;min-width:0}.integration-loading,.integration-error{font-size:.78rem;padding:.35rem .55rem;border-radius:999px;white-space:nowrap}.integration-loading{background:rgba(59,130,246,.12);color:#93c5fd}.integration-error{background:rgba(239,68,68,.12);color:#fca5a5}.global-search-results button.active,.global-search-results button[aria-selected="true"]{outline:2px solid currentColor;outline-offset:-2px}.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:1rem;border-bottom:1px solid rgba(148,163,184,.2)}.notification-item{padding:1rem;border-bottom:1px solid rgba(148,163,184,.15)}.notification-item p{margin:.35rem 0 0;opacity:.75}.empty-notifications{padding:1rem;opacity:.7}#notificationButton[data-count]:not([data-count="0"])::after{content:attr(data-count);position:absolute;transform:translate(45%,-55%);min-width:1.1rem;height:1.1rem;border-radius:999px;font-size:.65rem;display:inline-grid;place-items:center;background:#ef4444;color:white}.breadcrumbs span{opacity:.45;padding:0 .2rem}@media(max-width:767px){.integration-indicators{display:none}.integration-bar{grid-template-columns:1fr auto}.global-search-wrap{grid-column:1/-1;order:3}.context-selection{max-width:70vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}}
</style>
