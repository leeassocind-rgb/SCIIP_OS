<!doctype html><html><head><base target="_top"><style>
body{font:13px Arial,sans-serif;margin:0;background:#f5f7fa;color:#172033}.top{padding:16px;background:#172033;color:white}.top h2{margin:0 0 4px}.wrap{padding:12px}.card{background:white;border:1px solid #dfe5ee;border-radius:10px;padding:12px;margin-bottom:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{font-size:20px;font-weight:700}.muted{color:#667085}.btn{border:0;border-radius:7px;padding:9px 11px;margin:3px;cursor:pointer;background:#e8edf5}.primary{background:#172033;color:white}.danger{background:#9b1c1c;color:white}select{width:100%;padding:8px}.row{border-top:1px solid #edf0f4;padding:9px 0}.badge{display:inline-block;padding:3px 7px;border-radius:10px;background:#eef2f7;font-size:11px}.error{color:#9b1c1c}.ok{color:#137333}</style></head><body>
<div class="top"><h2>SCIIP Data Sources</h2><div>Industrial data pipeline</div></div><div class="wrap">
<div class="card"><button class="btn primary" onclick="createJob()">Create Import from Active Sheet</button><button class="btn" onclick="load()">Refresh</button><div id="msg" class="muted"></div></div>
<div class="card"><b>Recent imports</b><select id="jobs" onchange="load(this.value)"></select></div>
<div id="quality" class="card"></div><div id="job" class="card"></div><div id="review" class="card"></div><div id="commit" class="card"></div><div id="changes" class="card"></div></div>
<script>
var MODEL=null;function esc(v){return String(v==null?'':v).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}function busy(t){document.getElementById('msg').textContent=t||'';}
function load(id){busy('Loading…');google.script.run.withSuccessHandler(render).withFailureHandler(fail).sciipGetDataSourcesWorkspace(id||'');}
function render(m){MODEL=m;busy('');var s=document.getElementById('jobs');s.innerHTML='<option value="">Select import</option>'+m.jobs.map(function(j){return '<option '+(j.jobId===m.selectedJobId?'selected':'')+' value="'+esc(j.jobId)+'">'+esc(j.sourceName)+' · '+esc(j.status)+'</option>';}).join('');var q=m.dataQuality;document.getElementById('quality').innerHTML='<b>Data quality</b><div class="grid"><div><div class="kpi">'+q.score+'%</div><div class="muted">'+q.status+'</div></div><div>Missing coordinates: '+q.missingCoordinates+'<br>Missing APNs: '+q.missingApns+'<br>Validation errors: '+q.validationErrors+'</div></div>';document.getElementById('job').innerHTML=m.job?'<b>'+esc(m.job.sourceName)+'</b><div class="muted">'+esc(m.job.sourceType)+' · confidence '+m.job.confidence+'%</div><div>Rows '+m.job.rowCount+' · New '+m.job.newCount+' · Updates '+m.job.updateCount+' · Warnings '+m.job.warningCount+'</div>':'<b>No import selected</b>';document.getElementById('review').innerHTML='<b>Review queue</b>'+m.review.map(function(r){return '<div class="row"><b>'+esc(r.record.address||r.businessKey)+'</b> <span class="badge">'+esc(r.classification)+'</span><div class="muted">'+r.changes.length+' field changes · '+esc(r.reviewStatus)+'</div><button class="btn" onclick="decide(\''+r.recordId+'\',\'APPROVE\')">Approve</button><button class="btn" onclick="decide(\''+r.recordId+'\',\'HOLD\')">Hold</button><button class="btn danger" onclick="decide(\''+r.recordId+'\',\'REJECT\')">Reject</button></div>';}).join('');var p=m.plans.length?m.plans[m.plans.length-1]:null;document.getElementById('commit').innerHTML='<b>Commit control</b><div><button class="btn primary" onclick="prepare()">Prepare Commit</button>'+(p?'<button class="btn primary" onclick="execute(\''+p.planId+'\')">Execute '+p.operationCount+' Operations</button>':'')+'</div><div class="muted">Governed, idempotent and rollback-ready.</div>';document.getElementById('changes').innerHTML='<b>What changed?</b>'+m.whatChanged.slice(0,8).map(function(x){return '<div class="row">'+esc(x.summary)+'<div class="muted">'+esc(x.occurredAt)+'</div></div>';}).join('');}
function createJob(){busy('Creating import…');google.script.run.withSuccessHandler(function(x){load(x.job.jobId);}).withFailureHandler(fail).sciipDataSourcesCreateFromActiveSheet();}function decide(id,d){busy('Saving decision…');google.script.run.withSuccessHandler(function(){load(MODEL.selectedJobId);}).withFailureHandler(fail).sciipDataSourcesRecordDecision(MODEL.selectedJobId,id,d,'Workspace decision');}function prepare(){busy('Preparing commit…');google.script.run.withSuccessHandler(function(){load(MODEL.selectedJobId);}).withFailureHandler(fail).sciipDataSourcesPrepareCommit(MODEL.selectedJobId);}function execute(id){if(!confirm('Commit approved operations to SCIIP?'))return;busy('Committing…');google.script.run.withSuccessHandler(function(){load(MODEL.selectedJobId);}).withFailureHandler(fail).sciipDataSourcesExecuteCommit(id);}function fail(e){busy('');document.getElementById('msg').innerHTML='<span class="error">'+esc(e.message||e)+'</span>';}load();
</script></body></html>
