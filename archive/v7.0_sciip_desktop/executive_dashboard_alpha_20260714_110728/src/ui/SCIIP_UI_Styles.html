<style>
:root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color-scheme:light;--bg:#f4f6f8;--surface:#fff;--ink:#17202a;--muted:#667085;--line:#dfe4ea;--accent:#164e63;--accent2:#0e7490;--danger:#b42318;--focus:#2563eb}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,a{font:inherit}.skip-link{position:fixed;left:12px;top:-60px;z-index:100;padding:10px 14px;background:#fff;border:2px solid var(--focus)}.skip-link:focus{top:12px}.app-shell{min-height:100vh;display:grid;grid-template-columns:260px 1fr;grid-template-rows:64px 1fr;grid-template-areas:"top top" "side main"}.topbar{grid-area:top;display:flex;align-items:center;gap:14px;padding:0 20px;background:#0f172a;color:#fff;border-bottom:1px solid #1e293b}.brand{display:flex;flex-direction:column;line-height:1.1}.brand span{font-size:12px;color:#cbd5e1}.icon-button{display:none;background:transparent;border:1px solid #475569;color:#fff;border-radius:8px;padding:8px 10px}.status-chip{margin-left:auto;border:1px solid #475569;border-radius:999px;padding:6px 10px;font-size:12px}.sidebar{grid-area:side;background:var(--surface);border-right:1px solid var(--line);padding:18px 12px}.nav-button{width:100%;display:flex;align-items:center;gap:10px;border:0;background:transparent;text-align:left;padding:11px 12px;border-radius:8px;color:#344054;cursor:pointer}.nav-button:hover,.nav-button[aria-current="page"]{background:#ecfeff;color:#155e75}.nav-button:focus-visible,.primary-button:focus-visible,.icon-button:focus-visible{outline:3px solid var(--focus);outline-offset:2px}.main{grid-area:main;padding:28px;min-width:0}.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px}.eyebrow{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--accent2);margin:0 0 8px}.hero h1{margin:0;font-size:clamp(28px,4vw,44px)}.hero p{color:var(--muted)}.primary-button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:10px 14px;cursor:pointer}.content-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.card,.state-panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:0 1px 2px rgba(16,24,40,.05)}.card h2{font-size:15px;margin:0 0 8px}.metric{font-size:28px;font-weight:750}.muted{color:var(--muted)}.error{border-color:#fda29b;color:var(--danger)}@media(max-width:900px){.content-grid{grid-template-columns:1fr 1fr}.app-shell{grid-template-columns:220px 1fr}}@media(max-width:700px){.app-shell{grid-template-columns:1fr;grid-template-areas:"top" "main"}.icon-button{display:inline-block}.sidebar{position:fixed;inset:64px auto 0 0;width:min(86vw,300px);z-index:20;transform:translateX(-105%);transition:transform .2s ease;box-shadow:8px 0 24px rgba(0,0,0,.16)}.sidebar.open{transform:translateX(0)}.main{padding:20px}.hero{align-items:flex-start;flex-direction:column}.content-grid{grid-template-columns:1fr}}@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
</style>
