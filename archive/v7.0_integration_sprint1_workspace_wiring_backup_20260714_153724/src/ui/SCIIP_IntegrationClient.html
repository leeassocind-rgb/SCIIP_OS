<script>
(function(){'use strict';
const TYPES={PROPERTY_SELECTED:'PROPERTY_SELECTED',COMPANY_SELECTED:'COMPANY_SELECTED',MARKET_SELECTED:'MARKET_SELECTED',GRAPH_NODE_SELECTED:'GRAPH_NODE_SELECTED',MAP_FEATURE_SELECTED:'MAP_FEATURE_SELECTED',WORKSPACE_CHANGED:'WORKSPACE_CHANGED',SEARCH_CHANGED:'SEARCH_CHANGED',FILTER_CHANGED:'FILTER_CHANGED',CONTEXT_CLEARED:'CONTEXT_CLEARED',NOTIFICATION_CREATED:'NOTIFICATION_CREATED'};
const defaults={selectedProperty:null,selectedCompany:null,selectedMarket:null,selectedGraphNode:null,selectedMapFeature:null,currentWorkspace:(window.SCIIP_BOOTSTRAP||{}).activeWorkspace||'executive-dashboard',globalSearchText:'',activeFilters:{},mapExtent:null,userSession:(window.SCIIP_BOOTSTRAP||{}).session||null,loading:{active:false},error:null,notifications:[]};
let state=Object.assign({},defaults),subs=new Map(),eventSubs=new Map(),seq=0,history=[];
const clone=v=>v==null?v:JSON.parse(JSON.stringify(v));
const store={get:k=>k?clone(state[k]):clone(state),set:(k,v)=>store.patch({[k]:v}),patch:p=>{const prev=state;state=Object.assign({},state,clone(p),{revision:(state.revision||0)+1,updatedAt:new Date().toISOString()});subs.forEach(fn=>{try{fn({state:clone(state),previous:clone(prev),changedKeys:Object.keys(p)})}catch(e){}});persist();renderContext();return clone(state)},subscribe:fn=>{const id='s'+(++seq);subs.set(id,fn);return id},unsubscribe:id=>subs.delete(id),reset:()=>{state=clone(defaults);persist();renderContext();return clone(state)},snapshot:()=>clone(state),restore:s=>{state=Object.assign({},defaults,clone(s||{}));persist();renderContext();return clone(state)}};
const events={publish:(type,payload)=>{const e={id:'e'+(++seq),type,payload:clone(payload||{}),timestamp:new Date().toISOString()};history.push(e);history=history.slice(-200);eventSubs.forEach(s=>{if(s.type==='*'||s.type===type){try{s.fn(clone(e))}catch(err){}if(s.once)eventSubs.delete(s.id)}});return e},subscribe:(type,fn)=>{const id='e'+(++seq);eventSubs.set(id,{id,type,fn,once:false});return id},once:(type,fn)=>{const id=events.subscribe(type,fn);eventSubs.get(id).once=true;return id},unsubscribe:id=>eventSubs.delete(id),history:()=>clone(history)};
function persist(){try{sessionStorage.setItem('SCIIP_APP_STATE',JSON.stringify(state))}catch(e){}}
function restore(){try{const saved=JSON.parse(sessionStorage.getItem('SCIIP_APP_STATE')||'null');if(saved)state=Object.assign({},defaults,saved)}catch(e){}}
function entity(v,type){if(!v)return null;const id=v.propertyId||v.companyId||v.marketId||v.nodeId||v.featureId||v.id;return {id,label:v.label||v.address||v.name||id,entityType:type,data:clone(v)}}
events.subscribe('*',e=>{const p=e.payload||{};if(e.type===TYPES.PROPERTY_SELECTED){const x=entity(p.property||p,'PROPERTY');store.patch({selectedProperty:x,selectedGraphNode:x&&{id:x.id,label:x.label,entityType:'PROPERTY'},selectedMapFeature:x&&{id:x.id,label:x.label,entityType:'PROPERTY'}})}else if(e.type===TYPES.WORKSPACE_CHANGED)store.patch({currentWorkspace:p.workspaceId});else if(e.type===TYPES.SEARCH_CHANGED)store.patch({globalSearchText:p.text||''});else if(e.type===TYPES.CONTEXT_CLEARED)store.patch({selectedProperty:null,selectedCompany:null,selectedMarket:null,selectedGraphNode:null,selectedMapFeature:null})});
function renderContext(){const bar=document.getElementById('contextBar'),crumb=document.getElementById('breadcrumbs'),label=document.getElementById('selectedContext');if(!bar)return;const selected=state.selectedProperty||state.selectedCompany||state.selectedMarket||state.selectedGraphNode||state.selectedMapFeature;crumb.textContent='SCIIP / '+String(state.currentWorkspace||'').replace(/-/g,' ');label.textContent=selected?(selected.entityType+': '+selected.label):'No selected context';bar.dataset.hasContext=selected?'true':'false'}
function globalSearch(q){const box=document.getElementById('globalSearchResults');if(!box)return;if(!q){box.hidden=true;box.innerHTML='';return}const local=[];const b=window.SCIIP_BOOTSTRAP||{};((b.propertyExplorer||{}).properties||[]).forEach(x=>local.push({entityId:x.propertyId,label:x.address,entityType:'PROPERTY',sourceWorkspace:'property-explorer',entity:x}));const hits=local.filter(x=>(x.label+' '+x.entityId+' '+(x.entity.city||'')).toLowerCase().includes(q.toLowerCase())).slice(0,8);box.innerHTML=hits.length?hits.map(x=>`<button data-global-result="${String(x.entityId).replace(/"/g,'&quot;')}"><strong>${x.label}</strong><small>${x.entityType} · ${x.sourceWorkspace}</small></button>`).join(''):'<div class="global-search-empty">No local matches. Press Enter for full search.</div>';box.hidden=false;box.querySelectorAll('[data-global-result]').forEach(btn=>btn.onclick=()=>{const hit=hits.find(x=>x.entityId===btn.dataset.globalResult);events.publish(TYPES.PROPERTY_SELECTED,{property:hit.entity});document.querySelector('[data-view="property-explorer"]')?.click();box.hidden=true})}
restore();window.SCIIP_APP_STATE=store;window.SCIIP_APP_EVENTS=events;window.SCIIP_APP_EVENT_TYPES=TYPES;
document.addEventListener('click',e=>{const property=e.target.closest('[data-property-id]');if(property){const id=property.dataset.propertyId;const list=((window.SCIIP_BOOTSTRAP||{}).propertyExplorer||{}).properties||[];events.publish(TYPES.PROPERTY_SELECTED,{property:list.find(x=>String(x.propertyId)===String(id))||{propertyId:id}})}const view=e.target.closest('[data-view]');if(view)events.publish(TYPES.WORKSPACE_CHANGED,{workspaceId:view.dataset.view})});
document.getElementById('clearContextButton')?.addEventListener('click',()=>events.publish(TYPES.CONTEXT_CLEARED,{}));const search=document.getElementById('globalSearch');search?.addEventListener('input',e=>{events.publish(TYPES.SEARCH_CHANGED,{text:e.target.value});globalSearch(e.target.value)});renderContext();
})();
</script>
